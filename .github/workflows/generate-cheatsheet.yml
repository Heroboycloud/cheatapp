name: Generate Programming Cheatsheets EPUB

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:  # Manual trigger
    inputs:
      version_type:
        description: 'Version type (patch, minor, major)'
        required: false
        default: 'patch'
      languages:
        description: 'Languages'
        required: false
        default: 'all'

jobs:
  generate-ebook:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm install epub-gen@0.1.0
          npm install moment@2.29.4
          npm install fs-extra@11.1.1
      - name: Generate EPUB cheatsheet
        run: node generate-cheatsheet.js
        env:
          VERSION_TYPE: ${{ github.event.inputs.version_type || 'patch' }}
          LANGUAGES: ${{ github.event.inputs.languages || 'all' }}
          GITHUB_SHA: ${{ github.sha }}
      - name: Get version and filename
        id: vars
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "filename=Cheatsheets-$VERSION.epub" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cheatsheets-v${{ steps.vars.outputs.version }}
          name: "📚 Programming Cheatsheets v${{ steps.vars.outputs.version }}"
          body: |
            ## 📖 Programming Cheatsheets Collection
            **Version:** ${{ steps.vars.outputs.version }}
            **Generated:** ${{ steps.vars.outputs.date }}
            **Commit:** ${{ github.sha }}
            ### What's Included:
            - 🐍 Python Cheatsheet
            - 📜 JavaScript Cheatsheet
            - ☕ Java Cheatsheet
            - 🚀 Go Cheatsheet
            - 💎 Ruby Cheatsheet
            - 🗄️ SQL Cheatsheet
            - 🐚 Bash Cheatsheet
            - 🐳 Docker Cheatsheet
            - 📦 Git Cheatsheet
            ### Download
            Download the EPUB file below to get your programming cheatsheets!
            *Generated automatically by GitHub Actions*
          draft: false
          prerelease: false
          files: |
            ./output/${{ steps.vars.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to workflow artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: cheatsheets-epub
          path: ./output/*.epub
          retention-days: 30

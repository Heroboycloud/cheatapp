name: Generate Programming Cheatsheets EPUB

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type'
        required: false
        default: 'patch'

jobs:
  generate-ebook:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install epub-gen fs-extra moment
      
      - name: Generate EPUB
        run: node generate-cheatsheet.js
        env:
          VERSION_TYPE: ${{ github.event.inputs.version_type || 'patch' }}
      
      - name: Get version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: List files (debug)
        run: |
          echo "Current directory: $(pwd)"
          echo "Output directory:"
          ls -la output/ || echo "No output directory"
          echo "Find epub:"
          find . -name "*.epub"
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: cheatsheets-v${{ steps.version.outputs.version }}
          name: "Cheatsheets v${{ steps.version.outputs.version }}"
          artifacts: "output/*.epub"
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}
